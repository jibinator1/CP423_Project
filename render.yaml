services:
  - type: web
    name: clinical-ir-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd project && uvicorn livekit_ingest:app --host 0.0.0.0 --port 10000"
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_INGEST_TOKEN
        sync: false
  
  - type: worker
    name: transcription-agent
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python project/transcription_agent.py"
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_INGEST_TOKEN
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
